# Hyprland Minimal Configuration

# ---------------------------------------------------------
# Monitors
# ---------------------------------------------------------
# Default monitor configuration (Auto detect)
monitor=,preferred,auto,auto

# ---------------------------------------------------------
# Key Modifier (Super/Windows key)
# ---------------------------------------------------------
$mainMod = SUPER

# ---------------------------------------------------------
# Environment Variables
# ---------------------------------------------------------
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# ---------------------------------------------------------
# Programs & Autostart
# ---------------------------------------------------------
$terminal = ghostty
$fileManager = thunar
$menu = rofi -show drun

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ~/.config/hypr/scripts/xdg-portal-init.sh
exec-once = waybar
exec-once = bash -c "sleep 5; copyq --start-executable /usr/bin/copyq"
exec-once = nm-applet --indicator
exec-once = flameshot

# ---------------------------------------------------------
# Basic Keybindings
# ---------------------------------------------------------
# Open Terminal with tmux
bind = $mainMod, RETURN, exec, $terminal -e tmux new -As defo
# Open Terminal without tmux
bind = $mainMod SHIFT, RETURN, exec, $terminal

# Applications
bind = $mainMod, B, exec, firefox
bind = $mainMod, P, exec, rofi -show run
bind = $mainMod, O, exec, ~/.config/hypr/scripts/hypr-window-switcher.sh
bind = $mainMod, V, exec, copyq toggle

# ... (rest of keybindings) ...

# ---------------------------------------------------------
# Window Rules
# ---------------------------------------------------------
windowrule = noanim, rofi
windowrule = noanim, wofi
windowrule = float, rofi
windowrule = float, wofi
bind = $mainMod SHIFT, V, exec, copyq show
bind = , PRINT, exec, env XDG_CURRENT_DESKTOP=sway flameshot gui
bind = $mainMod SHIFT, P, exec, env XDG_CURRENT_DESKTOP=sway flameshot config

# Kill focused window
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, killactive,

# Exit Hyprland (Logout)
bind = $mainMod SHIFT, M, exit,

# Toggle floating mode
bind = $mainMod, SPACE, togglefloating,
bind = $mainMod, F11, fullscreen,

# Focus windows with H/J/K/L
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move windows with Shift + H/J/K/L
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# ---------------------------------------------------------
# Scratchpad (Quake-style)
# ---------------------------------------------------------
bind = $mainMod, grave, togglespecialworkspace,
bind = $mainMod SHIFT, grave, movetoworkspace, special

# ---------------------------------------------------------
# Media & Brightness Keys
# ---------------------------------------------------------
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ---------------------------------------------------------
# Workspaces
# ---------------------------------------------------------
# Switch workspaces (1-10)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Switch workspaces (11-20) with Ctrl
bind = $mainMod CTRL, 1, workspace, 11
bind = $mainMod CTRL, 2, workspace, 12
bind = $mainMod CTRL, 3, workspace, 13
bind = $mainMod CTRL, 4, workspace, 14
bind = $mainMod CTRL, 5, workspace, 15
bind = $mainMod CTRL, 6, workspace, 16
bind = $mainMod CTRL, 7, workspace, 17
bind = $mainMod CTRL, 8, workspace, 18
bind = $mainMod CTRL, 9, workspace, 19
bind = $mainMod CTRL, 0, workspace, 20

# Move window to workspace (1-10)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move window to workspace (11-20) with Ctrl + Shift
bind = $mainMod CTRL SHIFT, 1, movetoworkspace, 11
bind = $mainMod CTRL SHIFT, 2, movetoworkspace, 12
bind = $mainMod CTRL SHIFT, 3, movetoworkspace, 13
bind = $mainMod CTRL SHIFT, 4, movetoworkspace, 14
bind = $mainMod CTRL SHIFT, 5, movetoworkspace, 15
bind = $mainMod CTRL SHIFT, 6, movetoworkspace, 16
bind = $mainMod CTRL SHIFT, 7, movetoworkspace, 17
bind = $mainMod CTRL SHIFT, 8, movetoworkspace, 18
bind = $mainMod CTRL SHIFT, 9, movetoworkspace, 19
bind = $mainMod CTRL SHIFT, 0, movetoworkspace, 20

# ---------------------------------------------------------
# Look and Feel
# ---------------------------------------------------------
general {
    gaps_in = 2
    gaps_out = 4
    border_size = 1
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 4
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 3, myBezier
    animation = windowsOut, 1, 3, default, popin 80%
    animation = border, 1, 3, default
    animation = fade, 1, 3, default
    animation = workspaces, 1, 3, default
}

# ---------------------------------------------------------
# Mouse and Keyboard
# ---------------------------------------------------------
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

# Hyprland Minimal Configuration

# ---------------------------------------------------------
# Monitors
# ---------------------------------------------------------
# Default monitor configuration (1.875 scale for 2.8k display)
monitor=eDP-1,preferred,auto,1.875

# ---------------------------------------------------------
# Key Modifier (Super/Windows key)
# ---------------------------------------------------------
$mainMod = SUPER

# ---------------------------------------------------------
# Environment Variables
# ---------------------------------------------------------
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,wayland
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = PATH,$PATH:/home/nic3king/dirme/bin
env = _JAVA_OPTIONS,-Dawt.useSystemAAFontSettings=on
env = _JAVA_AWT_WM_NONREPARENTING,1

# ---------------------------------------------------------
# Programs & Autostart
# ---------------------------------------------------------
$terminal = ghostty
$fileManager = thunar
$menu = rofi -show drun

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ~/.config/hypr/scripts/xdg-portal-init.sh


exec-once = waybar
exec-once = dunst
exec-once = ~/dotfiles/scripts/scripts/battery-alert.sh
exec-once = copyq --start-server
exec-once = nm-applet --indicator

exec-once = flameshot
exec-once = hyprpaper
# Start the scratchpad terminal
exec-once = $terminal --class=ghostty-scratch -e tmux new -As defo

# ---------------------------------------------------------
# Basic Keybindings
# ---------------------------------------------------------
# Open Terminal with tmux
bind = $mainMod, RETURN, exec, $terminal -e tmux new -As defo
# Open Terminal without tmux
bind = $mainMod SHIFT, RETURN, exec, $terminal

# Applications
bind = $mainMod, B, exec, ~/opt/firefox/firefox
bind = $mainMod SHIFT, B, exec, killall -SIGUSR2 waybar || waybar
bind = $mainMod, M, exec, killall -SIGUSR1 waybar
bind = $mainMod, E, exec, ~/dotfiles/scripts/scripts/rofi-thunar
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod SHIFT, D, exec, rofi -show run
# Rofi Power Menu (themed)
$rofi_power = ~/dotfiles/scripts/scripts/launch-rofi-power.sh
bind = $mainMod, X, exec, $rofi_power
bind = $mainMod, O, exec, ghostty --title=ghostty-fzf -e ~/dotfiles/hypr/scripts/hypr-fzf-switcher.sh
bind = $mainMod CTRL, O, exec, ~/dotfiles/hypr/scripts/hypr-fzf-stash.sh
bind = $mainMod SHIFT, O, exec, ~/dotfiles/hypr/scripts/hypr-fzf-stash.sh --keep-focused
bind = $mainMod CTRL SHIFT, O, workspace, 20
bind = $mainMod, P, exec, ghostty --title=ghostty-tmux -e ~/dotfiles/hypr/scripts/hypr-tmux-session.sh
bind = $mainMod, V, exec, copyq toggle

# ... (rest of keybindings) ...


# # Create headless monitor for OBS capture                                                                                                                 │
# bind = $mainMod SHIFT, K, exec, hyprctl output create headless HEADLESS-1 

# ---------------------------------------------------------
# Window Rules
# ---------------------------------------------------------
# Workspace 20 (window dumpster) - always fullscreen
windowrulev2 = fullscreen, workspace:w20

windowrulev2 = noanim, class:^(rofi)$
windowrulev2 = noanim, class:^(wofi)$
windowrulev2 = float, class:^(rofi)$
windowrulev2 = float, class:^(wofi)$

# Fuzzy window switcher popup (matched by initialTitle since ghostty ignores --class on Wayland)
windowrulev2 = float, initialTitle:^(ghostty-fzf)$
windowrulev2 = size 55% 45%, initialTitle:^(ghostty-fzf)$
windowrulev2 = center, initialTitle:^(ghostty-fzf)$
windowrulev2 = focusonactivate, initialTitle:^(ghostty-fzf)$
windowrulev2 = noanim, initialTitle:^(ghostty-fzf)$
windowrulev2 = pin, initialTitle:^(ghostty-fzf)$

# Tmux session picker popup
windowrulev2 = float, initialTitle:^(ghostty-tmux)$
windowrulev2 = size 55% 45%, initialTitle:^(ghostty-tmux)$
windowrulev2 = center, initialTitle:^(ghostty-tmux)$
windowrulev2 = focusonactivate, initialTitle:^(ghostty-tmux)$
windowrulev2 = noanim, initialTitle:^(ghostty-tmux)$
windowrulev2 = pin, initialTitle:^(ghostty-tmux)$

# Modern Scratchpad Rules (V2)
windowrulev2 = float, class:^(ghostty-scratch)$
windowrulev2 = workspace special:scratch, class:^(ghostty-scratch)$
windowrulev2 = size 90% 45%, class:^(ghostty-scratch)$
windowrulev2 = move 5% 0, class:^(ghostty-scratch)$
windowrulev2 = focusonactivate, class:^(ghostty-scratch)$

# KeePassXC Rules
windowrulev2 = float, class:^(org.keepassxc.KeePassXC)$, title:^(KeePassXC -  Access Request)$

# CopyQ Rules
windowrulev2 = float, class:^(com.github.hluk.copyq)$
windowrulev2 = move center, class:^(com.github.hluk.copyq)$
windowrulev2 = float, class:^(copyq)$
windowrulev2 = move center, class:^(copyq)$
windowrulev2 = float, title:^(CopyQ)$
windowrulev2 = move center, title:^(CopyQ)$

# XDG Desktop Portal Rules (Teams/app open dialogs)
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = move center, class:^(xdg-desktop-portal-gtk)$

bind = $mainMod SHIFT, V, exec, copyq show
bind = , PRINT, exec, env XDG_CURRENT_DESKTOP=sway flameshot gui
bind = $mainMod SHIFT, P, exec, env XDG_CURRENT_DESKTOP=sway flameshot config

# Kill focused window
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, killactive,

# Exit Hyprland (Logout) & Power Menu
bind = , XF86PowerOff, exec, $rofi_power
bind = $mainMod SHIFT, ESCAPE, exit,

# Wallpaper Cycling (Super + Delete)
bind = $mainMod, DELETE, exec, ~/dotfiles/hypr/scripts/cycle-wallpaper.sh

# Toggle floating mode
bind = $mainMod, SPACE, togglefloating,
bind = $mainMod, F11, fullscreen,

# Focus windows with H/J/K/L
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move windows with Shift + H/J/K/L
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# ---------------------------------------------------------
# Tabbed (Group) Management (i3-like)
# ---------------------------------------------------------
bind = $mainMod, W, togglegroup,
bind = $mainMod, TAB, changegroupactive, f
bind = $mainMod SHIFT, TAB, changegroupactive, b

# Move window INTO the group in the specified direction
bind = $mainMod CTRL, H, moveintogroup, l
bind = $mainMod CTRL, L, moveintogroup, r
bind = $mainMod CTRL, K, moveintogroup, u
bind = $mainMod CTRL, J, moveintogroup, d

# ---------------------------------------------------------
# Scratchpad (Quake-style)
# ---------------------------------------------------------
bind = $mainMod, grave, togglespecialworkspace, scratch
bind = $mainMod SHIFT, grave, movetoworkspace, special:scratch

# ---------------------------------------------------------
# Media & Brightness Keys
# ---------------------------------------------------------
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ---------------------------------------------------------
# Workspaces
# ---------------------------------------------------------
# Toggle to previous workspace
bind = $mainMod, Tab, workspace, previous

# Switch workspaces (1-10)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Switch workspaces (11-20) with Ctrl
bind = $mainMod CTRL, 1, workspace, 11
bind = $mainMod CTRL, 2, workspace, 12
bind = $mainMod CTRL, 3, workspace, 13
bind = $mainMod CTRL, 4, workspace, 14
bind = $mainMod CTRL, 5, workspace, 15
bind = $mainMod CTRL, 6, workspace, 16
bind = $mainMod CTRL, 7, workspace, 17
bind = $mainMod CTRL, 8, workspace, 18
bind = $mainMod CTRL, 9, workspace, 19
bind = $mainMod CTRL, 0, workspace, 20

# Move window to workspace (1-10)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move window to workspace (11-20) with Ctrl + Shift
bind = $mainMod CTRL SHIFT, 1, movetoworkspace, 11
bind = $mainMod CTRL SHIFT, 2, movetoworkspace, 12
bind = $mainMod CTRL SHIFT, 3, movetoworkspace, 13
bind = $mainMod CTRL SHIFT, 4, movetoworkspace, 14
bind = $mainMod CTRL SHIFT, 5, movetoworkspace, 15
bind = $mainMod CTRL SHIFT, 6, movetoworkspace, 16
bind = $mainMod CTRL SHIFT, 7, movetoworkspace, 17
bind = $mainMod CTRL SHIFT, 8, movetoworkspace, 18
bind = $mainMod CTRL SHIFT, 9, movetoworkspace, 19
bind = $mainMod CTRL SHIFT, 0, movetoworkspace, 20

# ---------------------------------------------------------
# Look and Feel
# ---------------------------------------------------------
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

group {
    col.border_inactive = rgba(595959aa)
    col.border_active = rgba(33ccffee)
    groupbar {
        font_size = 10
        gradients = true
        text_color = rgba(ffffffff)
        col.active = rgba(33ccffee)
        col.inactive = rgba(595959aa)
    }
}

decoration {
    rounding = 4
    blur {
        enabled = true
        size = 3
        passes = 1
    }

    active_opacity = 0.95
    inactive_opacity = 0.95
    fullscreen_opacity = 1
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 3, myBezier
    animation = windowsOut, 1, 3, default, popin 80%
    animation = border, 1, 3, default
    animation = fade, 1, 3, default
    animation = workspaces, 1, 3, default
}

# ---------------------------------------------------------
# Mouse and Keyboard
# ---------------------------------------------------------
input {
    kb_layout = us,it,tr
    kb_variant =
    kb_model =
    kb_options = grp:win_space_toggle
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

device {
    name = tpps/2-elan-trackpoint
    sensitivity = 0.6
    accel_profile = flat
}

# Mouse bindings for moving and resizing windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Layout Switcher (Super + Ctrl + M)
bind = $mainMod CTRL, M, exec, hyprctl switchxkblayout all next
